services:
  # -------------------------------------------------------------------------
  # 1. API Web Service (FastAPI)
  # -------------------------------------------------------------------------
  - type: web
    name: docintel-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: REDIS_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_AI_API_KEY
        sync: false

  # -------------------------------------------------------------------------
  # 2. Celery Worker
  # -------------------------------------------------------------------------
  - type: worker
    name: docintel-worker
    env: python
    buildCommand: "pip install -r requirements.txt"
    # Concurrency of 2 to keep memory usage low on the free tier
    startCommand: "celery -A app.celery_app worker -l info --concurrency=2"
    envVars:
      - key: REDIS_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_AI_API_KEY
        sync: false

  # -------------------------------------------------------------------------
  # 3. Celery Beat (Scheduler)
  # -------------------------------------------------------------------------
  - type: worker
    name: docintel-beat
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A app.celery_app beat -l info"
    envVars:
      - key: REDIS_URL
        sync: false
